apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

labels:
- pairs:
    app.kubernetes.io/environment: production

  # Jenkins changes this only for a vMAJOR.MINOR.PATCH release tag.
images:
- name: ghcr.io/pils10/vite-demo
  newName: ghcr.io/pils10/vite-demo
  newTag: v1.0.0

  # Two replicas make the production overlay visibly different from dev.
replicas:
- count: 2
  name: vite-demo
